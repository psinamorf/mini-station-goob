- type: constructionGraph
  id: ClockworkGirder
  start: start
  graph:
    - node: start
      edges:
        - to: clockworkWall
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: Brass
              amount: 1
              doAfter: 1

    - node: clockworkWall
      entity: WallClock

- type: construction
  name: construction-recipe-clockwork-wall
  id: ClockworkWallConstruction
  graph: ClockworkGirder
  startNode: start
  targetNode: clockworkWall
  hide: true
  category: craft-category-RatvarConstruction
  objectType: Structure
  entityWhitelist:
    components:
    - RatvarRighteous
  description: construction-recipe-clockwork-wall-desc
  conditions:
  - !type:TileNotBlocked
    failIfSpace: false
  placementMode: SnapgridCenter
  canRotate: false
