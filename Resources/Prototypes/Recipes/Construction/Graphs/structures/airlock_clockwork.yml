- type: constructionGraph
  id: PinionAirlock
  start: start
  graph:
  - node: start
    edges:
    - to: airlock
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: Brass
        amount: 2
        doAfter: 1
    - to: glassAirlock
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: Brass
        amount: 2
        doAfter: 1

  - node: airlock
    entity: PinionAirlock

  - node: glassAirlock
    entity: PinionAirlockGlass

- type: construction
  name: construction-recipe-pinion-airlock
  id: PinionAirlockConstruction
  graph: PinionAirlock
  startNode: start
  targetNode: airlock
  hide: true
  category: craft-category-RatvarConstruction
  objectType: Structure
  entityWhitelist:
    components:
    - RatvarRighteous
  description: construction-recipe-pinion-airlock-desc
  conditions:
  - !type:TileNotBlocked
    failIfSpace: false
  placementMode: SnapgridCenter
  canRotate: false

- type: construction
  name: construction-recipe-pinion-airlock-glass
  id: PinionAirlockGlassConstruction
  graph: PinionAirlock
  startNode: start
  targetNode: glassAirlock
  hide: true
  category: craft-category-RatvarConstruction
  objectType: Structure
  entityWhitelist:
    components:
    - RatvarRighteous
  description: construction-recipe-pinion-airlock-glass-desc
  conditions:
  - !type:TileNotBlocked
    failIfSpace: false
  placementMode: SnapgridCenter
  canRotate: false
