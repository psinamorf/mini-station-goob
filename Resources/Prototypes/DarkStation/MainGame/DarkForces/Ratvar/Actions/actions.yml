- type: entity
  id: RatvarMidasTouch
  name: action-name-ratvar-midas-touch
  description: action-desc-ratvar-midas-touch
  components:
  - type: Action
    itemIconStyle: NoItem
    checkCanInteract: true
    useDelay: 10
    icon:
      sprite: DarkStation/MainGame/DarkForces/Ratvar/actions.rsi
      state: clocked_hand
    sound:
      path: /Audio/Magic/forcewall.ogg
  - type: TargetAction
    interactOnMiss: false
    range: 6
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:MidasTouchEvent

- type: entity
  id: RatvarClockMagic
  name: action-name-ratvar-clock-magic
  description: action-desc-ratvar-clock-magic
  components:
  - type: Action
    itemIconStyle: NoItem
    checkCanInteract: true
    useDelay: 10
    icon:
      sprite: DarkStation/MainGame/DarkForces/Ratvar/actions.rsi
      state: carve
    sound:
      path: /Audio/Magic/forcewall.ogg
  - type: TargetAction
    interactOnMiss: false
    range: 6
  - type: EntityTargetAction
    canTargetSelf: false
    event: !type:RatvarMagicEvent
