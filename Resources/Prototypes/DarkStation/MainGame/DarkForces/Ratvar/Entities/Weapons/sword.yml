- type: entity
  id: RatvarSword
  parent: BaseItem
  suffix: Ratvar
  components:
  - type: Sharp
  - type: Sprite
    sprite: DarkStation/MainGame/DarkForces/Ratvar/Weapons/clock_sword.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 20
  - type: Item
    size: Large
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RatvarEnchantmentableVisuals.State:
        overlay:
          Swordsman: {
            state: icon-blue,
            visible: true
          }
          Bloodshed: {
            state: icon-red,
            visible: true
          }
          None: { visible: false }
  - type: RatvarSword
  - type: RatvarEnchantmentable
    enchantments:
    - action: RatvarSwordsSwordsman
      name: enchant-name-RatvarSword-0
      icon:
        sprite: DarkStation/MainGame/DarkForces/Ratvar/Weapons/clock_sword.rsi
        state: icon-blue
      visuals: Swordsman
    - action: RatvarSwordBloodshed
      name: enchant-name-RatvarSword-1
      icon:
        sprite: DarkStation/MainGame/DarkForces/Ratvar/Weapons/clock_sword.rsi
        state: icon-red
      visuals: Bloodshed
  - type: RatvarItem
  - type: UserInterface
    interfaces:
      enum.RatvarEnchantmentUIKey.Key:
        type: RatvarEnchantmentBUI

- type: entity
  parent: BaseAction
  id: RatvarSwordsSwordsman
  components:
  - type: Action
    itemIconStyle: BigItem
    useDelay: 10
  - type: InstantAction
    event: !type:RatvarSwordSwordsmanEvent

- type: entity
  parent: BaseAction
  id: RatvarSwordBloodshed
  components:
  - type: Action
    itemIconStyle: BigItem
    useDelay: 10
  - type: InstantAction
    event: !type:RatvarSwordBloodshedEvent
