- type: entity
  id: RatvarSpear
  parent: Spear
  suffix: Ratvar
  components:
  - type: Sprite
    sprite: DarkStation/MainGame/DarkForces/Ratvar/Weapons/ratvar_spear.rsi
    state: spear
  - type: SolutionContainerVisuals
    inHandsMaxFillLevels: 0
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 12
    canWideSwing: true
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 25
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RatvarEnchantmentableVisuals.State:
        overlay:
          ElectricalTouch: {
            state: icon-blue,
            visible: true
          }
          None: { visible: false }
  - type: RatvarSpear
  - type: RatvarEnchantmentable
    enchantments:
    - action: RatvarSpearElectricalTouch
      name: enchant-name-RatvarSpear-0
      icon:
        sprite: DarkStation/MainGame/DarkForces/Ratvar/Weapons/ratvar_spear.rsi
        state: icon-blue
      visuals: ElectricalTouch
  - type: RatvarItem
  - type: UserInterface
    interfaces:
      enum.RatvarEnchantmentUIKey.Key:
        type: RatvarEnchantmentBUI

- type: entity
  parent: BaseAction
  id: RatvarSpearElectricalTouch
  components:
  - type: Action
    itemIconStyle: BigItem
    useDelay: 10
  - type: InstantAction
    event: !type:RatvarSpearElectricalTouchEvent

- type: entity
  parent: BaseAction
  id: RatvarSpearConfusion
  components:
  - type: Action
    itemIconStyle: BigItem
    useDelay: 10
  - type: InstantAction
    event: !type:RatvarSpearConfusionEvent
