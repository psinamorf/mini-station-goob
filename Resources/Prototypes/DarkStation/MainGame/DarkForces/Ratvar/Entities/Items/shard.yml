- type: entity
  id: RatvarShard
  parent: BaseItem
  name: ent-RatvarShard
  description: ent-RatvarShard.desc
  suffix: Ratvar
  components:
  - type: Sprite
    sprite: DarkStation/MainGame/DarkForces/Ratvar/Items/shard.rsi
    layers:
    - state: shard
  - type: GenericVisualizer
    visuals:
      enum.RatvarEnchantmentableVisuals.State:
        overlay:
          Reconstruct: { state: shard_overlay_1 }
          Emp: { state: shard_overlay_2 }
  - type: UserInterface
    interfaces:
      enum.RatvarEnchantmentUIKey.Key:
        type: RatvarEnchantmentBUI
  - type: RatvarEnchantmentable
    enchantments:
    - action: RatvarShardReconstruct
      name: enchant-name-RatvarShard-0
      icon:
        sprite: DarkStation/MainGame/DarkForces/Ratvar/Items/shard.rsi
        state: shard_overlay_1
      visuals: Reconstruct
    - action: RatvarShardEmp
      name: enchant-name-RatvarShard-1
      icon:
        sprite: DarkStation/MainGame/DarkForces/Ratvar/Items/shard.rsi
        state: shard_overlay_2
      visuals: Emp
  - type: Appearance
  - type: Item
    size: Small
  - type: RatvarShard
  - type: RatvarItem

- type: entity
  parent: BaseAction
  id: RatvarShardReconstruct
  name: ent-RatvarShardReconstruct
  description: ent-RatvarShardReconstruct.desc
  components:
  - type: Action
    itemIconStyle: BigItem
    useDelay: 10
  - type: InstantAction
    event: !type:RatvarShardReconstructEvent

- type: entity
  parent: BaseAction 
  id: RatvarShardEmp
  name: ent-RatvarShardEmp
  description: ent-RatvarShardEmp.desc
  components:
  - type: Action
    itemIconStyle: BigItem
    useDelay: 10
  - type: InstantAction
    event: !type:RatvarShardEmpEvent
