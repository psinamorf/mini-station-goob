- type: entity
  name: энергетический меч Синего Щита
  parent: [BaseMeleeWeaponEnergy, BaseSyndicateContraband]
  id: EnergySwordBlueshield
  description: "Передовая технология, выданная в эксперементальном порядке лучшим оперативникам Синего Щита."
  components:
  - type: Sprite
    sprite: _Mini/Objects/Weapons/Melee/e_sword.rsi
    layers:
    - state: e_sword
    - state: e_sword_blade
      color: "#FFFFFF"
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: Item
    sprite: Objects/Weapons/Melee/e_sword-inhands.rsi
  - type: Tag # WD EDIT
    tags:
    - EnergySword
  - type: ThrowableBlocker # Goobstation
    blockSound:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
        volume: -2
  - type: StaticPrice
    price: 2500

- type: entity
  name:  рапира
  parent: [ BaseSword, BaseCentcommContraband ]
  id: BlueshieldRapier
  description: My blades are extension of me.
  components:
  - type: Sprite
    sprite: _Mini/Objects/Weapons/Melee/Rapier.rsi
  - type: DisarmMalus
    malus: 0.225
  - type: MeleeWeapon
    wideAnimationRotation: -135
    angle: 0
    animation: WeaponArcThrust
    attackRate: 1.2
    damage:
      types:
        Piercing: 17
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 4
  - type: MeleeChemicalInjector
    solution: melee
  - type: RefillableSolution
    solution: melee
  - type: InjectableSolution
    solution: melee
  - type: SolutionTransfer
    maxTransferAmount: 1
  - type: Reflect
    reflects:
    - NonEnergy
    - Energy
    reflectProb: 0.10
    spread: 180
  - type: Item
    sprite: _Mini/Objects/Weapons/Melee/Rapier.rsi
  - type: Tag
    tags:
    - CaptainSabre
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 14
  - type: ThrowingAngle
    angle: 225
