- type: entity
  id: EncryptedCacheNode
  name: encrypted cache
  description: A secured objective cache containing encrypted bitrunning verification data.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Orion/Objects/Specific/Cargo/Bitrunning/encrypted_cache.rsi
    drawdepth: Effects
    noRot: true
    layers:
      - state: icon
        shader: unshaded
      - state: overlay
        shader: unshaded
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: InteractionOutline
  - type: Clickable
  - type: AmbientSound
    volume: -4
    sound:
      path: /Audio/Ambience/ambitech3.ogg
  - type: PointLight
    enabled: true
    radius: 1.7
    power: 2
    color: "#67e8ff"
  - type: BitrunningObjectivePoint
